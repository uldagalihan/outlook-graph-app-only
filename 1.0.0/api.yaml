name: Outlook Graph (AppOnly)
description: Microsoft Graph (Outlook) with application (client_credentials) auth. Reads mailbox via /v1.0/users/{mailbox}.
app_version: "1.0.0"
categories:
  - Communication
  - Email
contact_info:
  name: outlook-graph-app-only
  url: https://graph.microsoft.com
  email: noreply@example.com

actions:
  - name: list_inbox
    description: List Inbox messages (app-only)
    parameters:
      - name: tenant_id
        description: Entra ID tenant (GUID)
        required: true
        schema:
          type: string
      - name: client_id
        description: App (client) ID
        required: true
        schema:
          type: string
      - name: client_secret
        description: Client secret
        required: true
        schema:
          type: string
      - name: mailbox
        description: Target mailbox UPN (e.g. soar@mycompany.com)
        required: true
        schema:
          type: string
      - name: top
        description: Page size
        required: false
        schema:
          type: integer
          default: 50
      - name: orderby
        description: OData orderby
        required: false
        schema:
          type: string
          default: "receivedDateTime desc"
      - name: select
        description: OData select
        required: false
        schema:
          type: string
          default: "subject,from,receivedDateTime,bodyPreview,hasAttachments,webLink,id"
    returns:
      description: Graph list response
      example: '{"success": true, "data": {"value": []}}'
      schema:
        type: object

  - name: list_next_page
    description: Follow @odata.nextLink to fetch next page
    parameters:
      - name: tenant_id
        required: true
        schema: { type: string }
      - name: client_id
        required: true
        schema: { type: string }
      - name: client_secret
        required: true
        schema: { type: string }
      - name: next_link
        description: Value from @odata.nextLink
        required: true
        schema: { type: string }
    returns:
      description: Next page response
      example: '{"success": true, "data": {"value": []}}'
      schema:
        type: object

  - name: list_inbox_delta
    description: Use /messages/delta to get changes
    parameters:
      - name: tenant_id
        required: true
        schema: { type: string }
      - name: client_id
        required: true
        schema: { type: string }
      - name: client_secret
        required: true
        schema: { type: string }
      - name: mailbox
        required: true
        schema: { type: string }
      - name: delta_link
        description: If provided, call this link directly
        required: false
        schema: { type: string }
      - name: top
        required: false
        schema: { type: integer, default: 100 }
    returns:
      description: Delta response (may return @odata.nextLink or @odata.deltaLink)
      example: '{"success": true, "delta_link": null, "next_link": null}'
      schema:
        type: object